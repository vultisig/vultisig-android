# CodeRabbit configuration for Vultisig repos
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit

language: en
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: true
    base_branches:
      - main
      - master
  path_instructions:
    - path: "**/*.kt"
      instructions: |
        Review Guidelines:
        - Jetpack Compose with Material 3
        - MVVM with Hilt DI, sealed classes for UI state
        - Use safeLaunch for network coroutines, bodyOrThrow() for API calls
        - Null safety: avoid !!, use ?.let, ?:
    - path: "**/strings.xml"
      instructions: |
        String resource changes must be applied to ALL 9 locale files.
        Check: values/, values-de/, values-es/, values-hr/, values-it/, values-nl/, values-pt/, values-ru/, values-zh-rCN/
  tools:
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 300000
chat:
  auto_reply: true
