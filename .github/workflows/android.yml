name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # These jobs only read the repo (build/lint/test); they never push.
          # Don't persist the auth token in git config to reduce attack surface.
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Only assemble the debug variant and run debug unit tests.
      # Avoids the release R8/minify pass and the duplicate release unit-test
      # run that `./gradlew build` would otherwise perform.
      - name: Build debug + run unit tests
        env:
          TRUSTWALLET_PAT: ${{ secrets.TRUSTWALLET_PAT }}
          TRUSTWALLET_USER: ${{ secrets.TRUSTWALLET_USER }}
        run: ./gradlew assembleDebug testDebugUnitTest --parallel --build-cache

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # These jobs only read the repo (build/lint/test); they never push.
          # Don't persist the auth token in git config to reduce attack surface.
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        env:
          TRUSTWALLET_PAT: ${{ secrets.TRUSTWALLET_PAT }}
          TRUSTWALLET_USER: ${{ secrets.TRUSTWALLET_USER }}
        # Cap the daemon heap so the lintAnalyzeDebug worker JVM (which inherits
        # these args) plus the daemon both fit in the runner's memory. The 4 GB
        # default doubles up across daemon + worker and OOMs.
        run: ./gradlew lintDebug --build-cache -Dorg.gradle.jvmargs="-Xmx2g -Dfile.encoding=UTF-8"

      - name: Archive code analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Lint-Reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt

  instrumented-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # These jobs only read the repo (build/lint/test); they never push.
          # Don't persist the auth token in git config to reduce attack surface.
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Free disk space for the emulator
      - name: Free disk space
        run: |
          echo "Freeing disk space..."
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/nodejs || true
          sudo apt-get clean
          df -h

      # Enable KVM for better emulator performance
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cache AVD for faster builds
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-29-v2

      # Clean only when cache did not restore
      - name: Clean old AVD on cache miss
        if: steps.avd-cache.outputs.cache-hit != 'true'
        run: rm -rf ~/.android/avd/*

      # Run instrumented tests with minimal emulator
      - name: Run instrumented tests with emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          TRUSTWALLET_PAT: ${{ secrets.TRUSTWALLET_PAT }}
          TRUSTWALLET_USER: ${{ secrets.TRUSTWALLET_USER }}
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 5
          force-avd-creation: false
          emulator-options: -no-window -noaudio -no-snapshot-save -no-snapshot -no-snapstorage -gpu swiftshader_indirect -no-boot-anim
          disable-animations: true
          disable-spellchecker: true
          script: |
            # Run debug instrumented tests (connectedDebugAndroidTest)
            ./gradlew app:connectedDebugAndroidTest --stacktrace
