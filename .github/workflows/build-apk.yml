name: Build Debug APK

on:
  push:
    branches: [ "fix/*", "feat/*" ]
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/nodejs || true
          sudo apt-get clean

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        env:
          GITHUB_TOKEN: ${{ secrets.TRUSTWALLET_PAT }}
          GITHUB_USER: ${{ secrets.TRUSTWALLET_USER }}
        run: ./gradlew assembleDebug --parallel --build-cache --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vultisig-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
