name: Android Setup
description: Checkout, set up JDK 21, init submodules, and make gradlew executable

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: git submodule update
      shell: bash
      run: git submodule update --init --recursive

    - name: Grant execute permission for gradlew
      shell: bash
      run: chmod +x gradlew
